<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>about me</title>
  <meta name="description" content="Your short description here." />
  <meta property="og:title" content="about me" />
  <meta property="og:description" content="simple thing to show a simple about me" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yoursite.com" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="about me" />
  <meta name="twitter:description" content="simple thing to show a simple about me" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0e0e0e;
      color: #c9c9c9;
      font-family: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
      font-size: clamp(13px, 1.8vw, 16px);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 5vw, 2rem);
    }

    main {
      max-width: min(480px, 90vw);
      width: 100%;
    }

    h1 {
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 400;
      color: #ffffff;
      text-transform: lowercase;
      margin-bottom: 0.4rem;
    }

    h1 .cursor {
      color: #555;
      animation: blink 1.1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .tagline {
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      color: #666;
      margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
    }

    p {
      color: #a0a0a0;
      margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
    }

    .links {
      display: flex;
      gap: clamp(1rem, 3vw, 1.5rem);
      flex-wrap: wrap;
    }

    .links a {
      color: #ffffff;
      text-decoration: none;
      font-size: clamp(0.8rem, 2vw, 0.9rem);
    }

    hr {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin-bottom: clamp(1.25rem, 3vw, 2rem);
    }

    footer {
      margin-top: clamp(2.5rem, 6vw, 4rem);
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #clock {
      color: #2e2e2e;
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      letter-spacing: 0.03em;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main > * {
      animation: fadeUp 0.6s ease both;
    }

    main > h1        { animation-delay: 0.05s; }
    main > .tagline  { animation-delay: 0.15s; }
    main > p         { animation-delay: 0.25s; }
    main > .links    { animation-delay: 0.35s; }
    main > footer    { animation-delay: 0.45s; }

    .links a {
      position: relative;
      border-bottom: none;
      padding-bottom: 2px;
    }

    .links a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: #888;
      transition: width 0.25s ease;
    }

    .links a:hover::after {
      width: 100%;
    }

    @media (max-width: 400px) {
      body {
        align-items: flex-start;
      }

      .links {
        flex-direction: column;
        gap: 0;
      }

      .links a {
        padding: 0.6rem 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1><span id="typed"></span><span class="cursor">_</span></h1>
    <p class="tagline">web designer</p>

    <p>
      i make stuff lol
    </p>

    <hr>

    <nav class="links">
      <a href="mailto:axis@cumallover.me">Email</a>
      <a href="https://github.com/mapadah" target="_blank" rel="noopener">GitHub</a>
      <!-- <a href="https://twitter.com/yourhandle" target="_blank" rel="noopener">Twitter</a> -->
    </nav>

    <footer>
      <span>© 2026</span>
      <span id="clock"></span>
    </footer>
  </main>
  <script>
    const text = 'nico';
    const el = document.getElementById('typed');
    let i = 0;
    const type = () => {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(type, 100);
      }
    };
    setTimeout(type, 300);

    const clock = document.getElementById('clock');
    const tick = () => {
      const now = new Date();
      let h = now.getHours();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      clock.textContent = `${h}:${m}:${s} ${ampm}`;
    };
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
